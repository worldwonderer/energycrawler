name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Compile check
        run: uv run python -m compileall -q main.py api media_platform tools config

      - name: Markdown link check
        run: uv run python tools/check_markdown_links.py --root .

      - name: CLI smoke test
        run: |
          uv run energycrawler --help
          uv run energycrawler init --no-check --force
          uv run energycrawler cleanup-report --json

      - name: Unit tests
        run: uv run pytest -q tests --ignore=tests/e2e
